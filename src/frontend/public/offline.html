<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindBridge — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1A1410;
      color: #F5EDE4;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
      gap: 24px;
    }
    .icon { font-size: 52px; }
    h1 { font-size: 22px; font-weight: 600; }
    p { font-size: 14px; color: rgba(245,237,228,0.65); line-height: 1.5; }
    .lines { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px; }
    .line {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      background: rgba(245,237,228,0.07);
      border: 1.5px solid rgba(245,237,228,0.12);
      border-radius: 12px;
      padding: 14px 16px;
      text-decoration: none;
    }
    .line-name { font-size: 12px; color: rgba(245,237,228,0.55); }
    .line-number { font-size: 26px; font-weight: 700; color: #C8943A; letter-spacing: 1px; }
    .line-note { font-size: 12px; color: rgba(245,237,228,0.45); }
    .divider { width: 100%; max-width: 340px; height: 1px; background: rgba(245,237,228,0.10); }
  </style>
</head>
<body>
  <div class="icon">💙</div>
  <h1>You're offline</h1>
  <p>You can still reach help right now.<br>These lines are free and confidential.</p>

  <div class="lines">
    <a href="tel:0800723253" class="line">
      <span class="line-name">Befrienders Kenya</span>
      <span class="line-number">0800 723 253</span>
      <span class="line-note">Free · 24/7 · Confidential</span>
    </a>
    <a href="tel:0900620800" class="line">
      <span class="line-name">Niskize</span>
      <span class="line-number">0900 620 800</span>
      <span class="line-note">Free · 24/7 · Confidential</span>
    </a>
  </div>

  <div class="divider"></div>
  <p>MindBridge will reconnect automatically<br>when your connection is restored.</p>
</body>
</html>
